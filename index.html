<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meting 格式歌单管理器</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #eee;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .tabs {
            position: fixed;
            top: 30px;
            left: 40px;
            z-index: 99;
            background: white;
            border: 1px solid #aaa;
            border-radius: 3px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        .tab {
            display: inline-block;
            padding: 8px 16px;
            cursor: pointer;
            border-right: 1px solid #ddd;
            background: #f2f2f2;
        }

        .tab:hover {
            background: #eaeaea;
        }

        .tab.active {
            background: white;
            font-weight: bold;
        }

        .tab:last-child {
            border-right: none;
        }

        iframe {
            width: 100%;
            height: 100vh;
            border: none;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">歌单链接</div>
        <div class="tab" onclick="switchTab(1)">文件管理</div>
        <div class="tab" onclick="switchTab(2)">歌单编辑</div>
    </div>
    
    <iframe id="contentFrame" src=""></iframe>
    
    <script>
        // 页面URL列表
        const pages = [
            "./api.php",
            "./assets/index.php",
            "./admin.php"
        ];
        
        // 当前激活的选项卡索引
        let activeTab = 0;
        
        // 切换选项卡函数
        function switchTab(index) {
            // 更新选项卡样式
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach((tab, i) => {
                if (i === index) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
            
            // 更新iframe内容
            const frame = document.getElementById('contentFrame');
            frame.src = pages[index];
            
            activeTab = index;
        }
        
        // 初始化页面
        window.onload = function() {
            switchTab(0);
        };
    </script>
</body>
</html>
